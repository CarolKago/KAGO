# ═══════════════════════════════════════════════════════════════
# KAGO ATELIER — Netlify Configuration
# ═══════════════════════════════════════════════════════════════

[build]
  publish = "."

# Clean URLs (remove .html)
[[redirects]]
  from = "/lookbook"
  to   = "/lookbook.html"
  status = 200

[[redirects]]
  from = "/services"
  to   = "/services.html"
  status = 200

[[redirects]]
  from = "/contact"
  to   = "/contact.html"
  status = 200

[[redirects]]
  from = "/admin"
  to   = "/admin.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
